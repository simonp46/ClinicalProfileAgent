services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-therapy_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-therapy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-therapy}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-therapy} -d ${POSTGRES_DB:-therapy_copilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/apps/api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api:/app/apps/api
      - ./data/artifacts:/app/data/artifacts
    command: ["sh", "-lc", "cd /app/apps/api && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/apps/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api:/app/apps/api
      - ./workers:/app/workers
      - ./data/artifacts:/app/data/artifacts
    command: ["sh", "-lc", "cd /app/apps/api && celery -A app.worker.celery_app worker --loglevel=INFO"]

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
    command: ["sh", "-lc", "cd /app/apps/web && npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"]

volumes:
  postgres_data: